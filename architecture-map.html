function matches(x){if(filter==='all')return true;if(filter==='bugs')return (FIXES[x.id]||[]).length||(KNOWN_BUGS[x.id]||[]).length;if(filter==='critical')return !!x.critical||x.kind==='critical';return (x.tag||[]).includes(filter)|| (x.tag||[]).includes('all')&&filter==='overview'}
function node(id){return nodes.find(n=>n.id===id)}function center(n){return{x:n.x+n.w/2,y:n.y+n.h/2}}function path(a,b){let p1={x:a.x+a.w,y:a.y+a.h/2},p2={x:b.x,y:b.y+b.h/2},dx=(p2.x-p1.x)*.5;return`M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`}function point(a,b){let c1=center(a),c2=center(b);return{x:(c1.x+c2.x)/2,y:(c1.y+c2.y)/2}}function el(n,a={}){let e=document.createElementNS('http://www.w3.org/2000/svg',n);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e}
function renderDefault(){side.innerHTML=`<h2>Architecture overview</h2><p>This map shows the Django request flow, role dashboards, learning features, chat, data models, and external seams.</p><div class="legend"><span><i class="sw" style="background:var(--critical)"></i>critical</span><span><i class="sw" style="background:var(--db)"></i>database</span><span><i class="sw" style="background:var(--external)"></i>external/API</span><span><i class="sw" style="background:var(--client)"></i>UI/mount</span></div><h3>Notable findings from this map</h3><div class="finding"><b>Critical spine:</b> browser → root URL router → main routes → login → CustomUser/profile → role dashboard shell.</div><div class="finding"><b>Chat seam:</b> messaging_views delegates access rules to messaging.py, then writes ChatMessage and ChatReadState.</div><div class="finding"><b>Dead-code candidate:</b> can_access_group appears unused in inspected call paths.</div><div class="finding"><b>UI seam:</b> mobile-adaptive.css is doing broad table-to-card fallback; important pages still deserve custom mobile cards.</div>`}
function renderSide(n){let inc=edges.filter(e=>e.to===n.id),out=edges.filter(e=>e.from===n.id);side.innerHTML=`<h2>${n.label}</h2><div class="path">${n.path}</div><p><b>Technical role:</b> ${n.role}</p><p><b>Plain English:</b> ${n.plain}</p><h3>Notes</h3><ul class="note">${(n.notes||[]).map(x=>`<li>${x}</li>`).join('')}</ul><h3>Incoming</h3><ul class="note">${inc.map(e=>`<li>${node(e.from)?.label||e.from} — ${e.label}</li>`).join('')||'<li>None</li>'}</ul><h3>Outgoing</h3><ul class="note">${out.map(e=>`<li>${node(e.to)?.label||e.to} — ${e.label}</li>`).join('')||'<li>None</li>'}</ul><h3>Fixes / bugs</h3><ul class="note">${[...(FIXES[n.id]||[]).map(f=>'Fix: '+f.t),...(KNOWN_BUGS[n.id]||[]).map(b=>'Bug '+b.sev+': '+b.t)].map(x=>`<li>${x}</li>`).join('')||'<li>None recorded</li>'}</ul>`}
function fit(){let st=document.getElementById('stage').getBoundingClientRect();s=Math.min(st.width/1760,st.height/760)*.94;tx=20;ty=20;draw()}document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;draw();renderDefault()});document.getElementById('fit').onclick=fit;document.getElementById('zin').onclick=()=>{s*=1.15;draw()};document.getElementById('zout').onclick=()=>{s/=1.15;draw()};document.getElementById('svg').onclick=()=>{selected=null;renderDefault();draw()};let drag=false,lx=0,ly=0;document.getElementById('svg').onmousedown=e=>{drag=true;lx=e.clientX;ly=e.clientY};window.onmouseup=()=>drag=false;window.onmousemove=e=>{if(!drag)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;draw()};document.getElementById('svg').onwheel=e=>{e.preventDefault();let old=s;let f=e.deltaY<0?1.1:.9;s*=f;let r=document.getElementById('svg').getBoundingClientRect();let mx=e.clientX-r.left,my=e.clientY-r.top;tx=mx-(mx-tx)*(s/old);ty=my-(my-ty)*(s/old);draw()};renderDefault();fit();
</script>
