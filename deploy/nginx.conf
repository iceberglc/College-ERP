# ============================================================
# Nginx config for ICEBERG ERP — app.iceberglc.com
# Place at: /etc/nginx/sites-available/iceberg-erp
# Enable:   sudo ln -s /etc/nginx/sites-available/iceberg-erp /etc/nginx/sites-enabled/
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.iceberglc.com;

    # Let's Encrypt challenge (certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://app.iceberglc.com$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.iceberglc.com;

    ssl_certificate     /etc/letsencrypt/live/app.iceberglc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.iceberglc.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # Service Worker must be served with no-cache so updates propagate
    location = /sw.js {
        alias /home/iceberg/College-ERP/public/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    # Static files (fingerprinted by WhiteNoise — cache forever)
    location /static/ {
        alias /home/iceberg/College-ERP/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files — served from the persistent directory OUTSIDE the repo
    # clone (set via DJANGO_MEDIA_ROOT in .env) so uploads survive
    # re-clones and redeploys.
    location /media/ {
        alias /home/iceberg/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Digital Asset Links (required for TWA / Play Store)
    location /.well-known/ {
        alias /home/iceberg/College-ERP/public/.well-known/;
        add_header Content-Type "application/json";
        add_header Access-Control-Allow-Origin "*";
    }

    # File upload size limit (match Django's MAX_UPLOAD_SIZE)
    client_max_body_size 15M;

    # Proxy everything else to Gunicorn
    location / {
        proxy_pass         http://unix:/run/gunicorn/iceberg.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
