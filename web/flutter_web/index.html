<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ICEBERG Study Center — student, teacher and admin portal.">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06343A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ICEBERG">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ICEBERG Study Center</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Branded boot screen shown until Flutter takes over — matches the
       Django login page's navy backdrop so there is no white flash. */
    html, body { margin: 0; padding: 0; background: #06343A; height: 100%; }
    #boot {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: linear-gradient(160deg, #06343A 0%, #073B42 55%, #0E6873 130%);
      transition: opacity .4s ease;
    }
    #boot .logo {
      width: 64px; height: 64px; border-radius: 18px; background: #DFFF2F;
      display: flex; align-items: center; justify-content: center;
      font: 800 26px/1 system-ui, sans-serif; color: #06343A;
      animation: pulse 1.6s ease-in-out infinite;
    }
    #boot .name {
      color: #fff; letter-spacing: 4px; font: 700 14px/1 system-ui, sans-serif;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(223,255,47,.35); }
      50% { transform: scale(1.06); box-shadow: 0 0 0 16px rgba(223,255,47,0); }
    }
  </style>
</head>
<body>
  <div id="boot">
    <div class="logo">I</div>
    <div class="name">ICEBERG</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('boot');
      if (el) { el.style.opacity = '0'; setTimeout(function(){ el.remove(); }, 450); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
