<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nimbus — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ─── Tokens ─────────────────────────────────────────────────────────── */
:root {
  --accent: #5b5bf6;
  --accent-soft: color-mix(in oklch, var(--accent) 14%, transparent);
  --accent-hi: color-mix(in oklch, var(--accent) 88%, white);
  --accent-lo: color-mix(in oklch, var(--accent) 78%, black);

  /* light */
  --bg: #fafaf8;
  --bg-elev: #ffffff;
  --bg-tint: #f4f4f1;
  --bg-deep: #ecece8;
  --line: #e7e7e2;
  --line-strong: #d6d6d0;
  --text: #18181b;
  --text-mid: #52525b;
  --text-dim: #8a8a90;
  --shadow-sm: 0 1px 2px rgba(15,15,20,.04), 0 1px 1px rgba(15,15,20,.03);
  --shadow-md: 0 1px 2px rgba(15,15,20,.04), 0 8px 24px -6px rgba(15,15,20,.08);
  --shadow-lg: 0 12px 40px -12px rgba(15,15,20,.18);

  --r-xs: 6px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 22px;

  --pad-y: 14px;
  --row-h: 44px;

  color-scheme: light;
}

.dark {
  --bg: #0b0b0f;
  --bg-elev: #14141a;
  --bg-tint: #1a1a22;
  --bg-deep: #07070a;
  --line: #232330;
  --line-strong: #2f2f3d;
  --text: #f4f4f6;
  --text-mid: #a0a0ab;
  --text-dim: #6c6c78;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4), 0 1px 1px rgba(0,0,0,.25);
  --shadow-md: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -6px rgba(0,0,0,.5);
  --shadow-lg: 0 18px 50px -12px rgba(0,0,0,.7);
  color-scheme: dark;
}

[data-density="compact"] { --row-h: 36px; --pad-y: 10px; }
[data-density="comfy"] { --row-h: 52px; --pad-y: 18px; }

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
}
.mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }

/* ─── Login ─────────────────────────────────────────────────────────── */
.login {
  display: grid;
  grid-template-columns: 60fr 40fr;
  height: 100%;
  min-height: 700px;
}
@media (max-width: 980px) {
  .login { grid-template-columns: 1fr; }
  .login__visual { display: none; }
}

.login__visual {
  position: relative;
  overflow: hidden;
  background: #0a0a14;
  isolation: isolate;
}
.mesh {
  position: absolute; inset: -30%;
  background:
    radial-gradient(40% 50% at 20% 30%, color-mix(in oklch, var(--accent) 70%, #6a44ff) 0%, transparent 60%),
    radial-gradient(35% 45% at 80% 20%, #2dd4bf 0%, transparent 55%),
    radial-gradient(45% 55% at 70% 80%, #a855f7 0%, transparent 60%),
    radial-gradient(30% 40% at 30% 85%, #f472b6 0%, transparent 55%),
    #0a0a14;
  filter: blur(40px) saturate(140%);
  animation: meshDrift 22s ease-in-out infinite alternate;
  opacity: .85;
}
@keyframes meshDrift {
  0%   { transform: translate3d(-4%, -2%, 0) scale(1.05) rotate(0deg); }
  50%  { transform: translate3d(3%, 4%, 0) scale(1.12) rotate(8deg); }
  100% { transform: translate3d(-2%, 3%, 0) scale(1.08) rotate(-6deg); }
}
.mesh::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
  background-size: 22px 22px;
  mix-blend-mode: overlay;
  opacity: .5;
}
.login__visual::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(10,10,20,0) 40%, rgba(10,10,20,.55) 100%);
  pointer-events: none;
}

.login__brandmark {
  position: absolute; top: 40px; left: 44px;
  display: flex; align-items: center; gap: 10px;
  color: #fff; font-weight: 700; letter-spacing: -.01em; font-size: 18px;
  z-index: 2;
}
.brand-glyph {
  width: 30px; height: 30px; border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), color-mix(in oklch, var(--accent) 50%, #18e0c4));
  box-shadow: 0 0 0 1px rgba(255,255,255,.15) inset, 0 8px 24px -6px color-mix(in oklch, var(--accent) 60%, transparent);
  position: relative;
}
.brand-glyph::after {
  content: ""; position: absolute; inset: 6px;
  border-radius: 5px;
  background: linear-gradient(135deg, rgba(255,255,255,.55), rgba(255,255,255,0));
}

.glass-card {
  position: absolute;
  left: 44px; right: 44px; bottom: 44px;
  padding: 28px 30px 26px;
  border-radius: 22px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.14);
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  color: #fff;
  box-shadow: 0 30px 80px -30px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) inset;
  z-index: 2;
  max-width: 520px;
}
.glass-card__eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
  color: rgba(255,255,255,.55);
  display: flex; align-items: center; gap: 8px;
}
.glass-card__eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #2dd4bf;
  box-shadow: 0 0 0 3px color-mix(in oklch, #2dd4bf 30%, transparent);
}
.glass-card__quote {
  font-size: 22px; line-height: 1.35; font-weight: 500;
  letter-spacing: -.012em;
  margin: 14px 0 22px;
  text-wrap: pretty;
}
.glass-card__author { display: flex; align-items: center; gap: 12px; }
.glass-card__avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, #f472b6, #a855f7);
  font-weight: 700; color: #fff;
  display: grid; place-items: center; font-size: 13px;
  border: 1.5px solid rgba(255,255,255,.25);
}
.glass-card__name { font-weight: 600; font-size: 14px; }
.glass-card__role { font-size: 12px; color: rgba(255,255,255,.6); }
.glass-card__pager {
  position: absolute; right: 24px; bottom: 24px;
  display: flex; gap: 6px;
}
.glass-card__pager .pip {
  width: 18px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.22);
  transition: background .3s, width .3s;
}
.glass-card__pager .pip.on { background: #fff; width: 28px; }

.floating-tag {
  position: absolute; z-index: 2;
  background: rgba(255,255,255,.07);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.14);
  color: #fff;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 12px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 14px 40px -16px rgba(0,0,0,.5);
}
.floating-tag.t1 { top: 22%; left: 8%; animation: floaty 9s ease-in-out infinite; }
.floating-tag.t2 { top: 14%; right: 9%; animation: floaty 11s ease-in-out infinite reverse; }
.floating-tag .swatch { width: 22px; height: 22px; border-radius: 7px; }
.floating-tag .swatch.a { background: linear-gradient(135deg, #2dd4bf, #5b5bf6); }
.floating-tag .swatch.b { background: linear-gradient(135deg, #f472b6, #a855f7); }
@keyframes floaty {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

/* Right side */
.login__form-wrap {
  background: var(--bg-elev);
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 40px 56px;
}
.login__top {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--text-mid);
}
.login__top .lang {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg);
  cursor: default;
}
.login__top .lang:hover { background: var(--bg-tint); }
.login__top a { color: var(--text); text-decoration: none; font-weight: 600; }
.login__top a:hover { color: var(--accent); }

.login__form {
  max-width: 380px;
  width: 100%;
  margin: auto;
  display: flex; flex-direction: column;
  gap: 22px;
  padding: 24px 0;
}
.login__form h3 {
  font-size: 30px; font-weight: 700; letter-spacing: -.022em;
  margin: 0; line-height: 1.15;
}
.login__form .sub {
  margin: 6px 0 0; color: var(--text-mid); font-size: 14.5px;
}

.social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-social {
  appearance: none; border: 1px solid var(--line); background: var(--bg-elev);
  color: var(--text); font: inherit; font-weight: 600; font-size: 13.5px;
  height: 44px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  cursor: default;
  transition: border-color .15s, background .15s, transform .1s;
}
.btn-social:hover { border-color: var(--line-strong); background: var(--bg-tint); }
.btn-social:active { transform: translateY(1px); }
.btn-social svg { width: 18px; height: 18px; }

.divider {
  display: flex; align-items: center; gap: 12px;
  color: var(--text-dim); font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase;
}
.divider::before, .divider::after {
  content: ""; flex: 1; height: 1px; background: var(--line);
}

/* Floating-label inputs */
.field { position: relative; }
.field input {
  width: 100%;
  height: 56px;
  padding: 22px 14px 8px;
  border-radius: var(--r-sm);
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--text);
  font: inherit; font-size: 14.5px; font-weight: 500;
  outline: none;
  transition: border-color .18s, box-shadow .18s, background .15s;
}
.field input:hover { border-color: var(--line-strong); }
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft);
  background: var(--bg-elev);
}
.field label {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: var(--text-dim);
  pointer-events: none;
  transition: all .18s ease;
}
.field input:focus + label,
.field input:not(:placeholder-shown) + label {
  top: 12px;
  transform: translateY(0);
  font-size: 11px; font-weight: 600;
  color: var(--text-mid);
  letter-spacing: .02em;
}
.field input:focus + label { color: var(--accent); }
.field .eye {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  width: 32px; height: 32px; border-radius: 8px;
  display: grid; place-items: center;
  color: var(--text-dim);
  cursor: default;
  border: 0; background: transparent;
}
.field .eye:hover { color: var(--text); background: var(--bg-tint); }
.field .err {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px; font-size: 12px;
  color: #ef4444;
}
.field.invalid input { border-color: #ef4444; }
.field.invalid input:focus { box-shadow: 0 0 0 4px color-mix(in oklch, #ef4444 18%, transparent); }

.form-utils {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px;
}
.check {
  display: inline-flex; align-items: center; gap: 8px; cursor: default;
  color: var(--text-mid); user-select: none;
}
.check input { display: none; }
.check .box {
  width: 18px; height: 18px; border-radius: 5px;
  border: 1.5px solid var(--line-strong);
  display: grid; place-items: center;
  transition: all .15s;
  color: transparent;
}
.check input:checked + .box {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.check:hover .box { border-color: var(--accent); }
.link { color: var(--accent); font-weight: 600; text-decoration: none; }
.link:hover { text-decoration: underline; }

.btn-primary {
  appearance: none; border: 0; cursor: default;
  width: 100%; height: 50px; border-radius: var(--r-sm);
  font: inherit; font-weight: 700; font-size: 14.5px;
  color: #fff; background: var(--accent);
  box-shadow: 0 8px 18px -8px color-mix(in oklch, var(--accent) 70%, transparent),
              inset 0 1px 0 rgba(255,255,255,.18);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: transform .12s ease, box-shadow .18s ease, background .15s;
  letter-spacing: -.005em;
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 16px 30px -10px color-mix(in oklch, var(--accent) 80%, transparent),
              inset 0 1px 0 rgba(255,255,255,.22);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: .85; cursor: default; transform: none; }

.spinner {
  width: 18px; height: 18px;
  border: 2.4px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.login__bottom {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12.5px; color: var(--text-dim);
}
.login__bottom .legal { display: flex; gap: 16px; }
.login__bottom .legal a { color: var(--text-mid); text-decoration: none; }
.login__bottom .legal a:hover { color: var(--text); }

.signup-cta {
  margin-top: 6px;
  text-align: center; font-size: 13.5px; color: var(--text-mid);
}

/* ─── Dashboard ─────────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: var(--sb-w, 232px) 1fr;
  height: 100%;
  background: var(--bg);
}
.app[data-collapsed="true"] { --sb-w: 68px; }

.sidebar {
  background: var(--bg-elev);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  min-width: 0;
}
.sb-brand {
  padding: 18px 18px 16px;
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 16px; letter-spacing: -.01em;
  border-bottom: 1px solid var(--line);
  height: 64px;
}
.sb-brand .brand-glyph { width: 28px; height: 28px; flex: none; }
.sb-brand .brand-name { white-space: nowrap; overflow: hidden; }
.app[data-collapsed="true"] .sb-brand { justify-content: center; padding: 18px 0 16px; }
.app[data-collapsed="true"] .brand-name,
.app[data-collapsed="true"] .sb-section,
.app[data-collapsed="true"] .sb-link span,
.app[data-collapsed="true"] .sb-foot { display: none; }
.app[data-collapsed="true"] .sb-link { justify-content: center; padding: 0; }
.app[data-collapsed="true"] .sb-link .icon-wrap { margin: 0; }

.sb-nav { flex: 1; overflow-y: auto; padding: 10px 12px 18px; }
.sb-section {
  font-size: 10.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-dim);
  padding: 14px 10px 8px;
}
.sb-link {
  position: relative;
  display: flex; align-items: center; gap: 10px;
  padding: 0 10px 0 12px;
  height: 38px; border-radius: 8px;
  color: var(--text-mid); font-size: 13.5px; font-weight: 500;
  cursor: default;
  user-select: none;
}
.sb-link:hover { background: var(--bg-tint); color: var(--text); }
.sb-link .icon-wrap {
  width: 20px; height: 20px; display: grid; place-items: center;
  flex: none;
}
.sb-link .badge {
  margin-left: auto;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 10.5px; font-weight: 700;
  padding: 2px 7px; border-radius: 999px;
  font-family: "JetBrains Mono", monospace;
}
.sb-link.active {
  background: var(--accent-soft);
  color: var(--accent-lo);
}
.dark .sb-link.active { color: #fff; background: color-mix(in oklch, var(--accent) 24%, transparent); }
.sb-link.active::before {
  content: ""; position: absolute; left: -12px; top: 6px; bottom: 6px; width: 3px;
  border-radius: 0 3px 3px 0; background: var(--accent);
}

.sb-foot {
  padding: 12px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
}
.sb-foot .av {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #18e0c4);
  color: #fff; display: grid; place-items: center;
  font-weight: 700; font-size: 12px;
  flex: none;
}
.sb-foot .who { min-width: 0; }
.sb-foot .who .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-foot .who .email { font-size: 11.5px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Main area */
.main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px;
  height: 64px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
  position: sticky; top: 0; z-index: 4;
}
.collapse-btn {
  width: 32px; height: 32px; border-radius: 8px;
  border: 0; background: transparent; color: var(--text-mid);
  display: grid; place-items: center; cursor: default;
}
.collapse-btn:hover { background: var(--bg-tint); color: var(--text); }

.search {
  flex: 1;
  max-width: 460px;
  display: flex; align-items: center; gap: 10px;
  height: 38px; padding: 0 12px;
  background: var(--bg-tint);
  border: 1px solid transparent;
  border-radius: 10px;
  color: var(--text-dim); font-size: 13px;
  cursor: text;
  transition: background .15s, border-color .15s;
}
.search:hover { background: var(--bg-deep); }
.search:focus-within { background: var(--bg-elev); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.search input {
  flex: 1; border: 0; background: transparent; outline: 0;
  color: var(--text); font: inherit; font-size: 13.5px;
}
.search input::placeholder { color: var(--text-dim); }
.kbd {
  font-family: "JetBrains Mono", monospace;
  font-size: 10.5px; font-weight: 600;
  padding: 2px 6px; border-radius: 5px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  color: var(--text-mid);
}

.top-actions { display: flex; align-items: center; gap: 6px; }
.icon-btn {
  position: relative;
  width: 36px; height: 36px; border-radius: 9px;
  border: 0; background: transparent; color: var(--text-mid);
  display: grid; place-items: center; cursor: default;
}
.icon-btn:hover { background: var(--bg-tint); color: var(--text); }
.icon-btn .dot {
  position: absolute; top: 8px; right: 9px;
  width: 7px; height: 7px; border-radius: 50%;
  background: #ef4444;
  border: 2px solid var(--bg-elev);
}
.av-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #18e0c4);
  color: #fff; font-weight: 700; font-size: 12px;
  display: grid; place-items: center;
  border: 0; cursor: default;
  outline: 2px solid var(--bg-elev);
  outline-offset: 1px;
  box-shadow: 0 0 0 1.5px var(--line);
}

.scroll {
  flex: 1; overflow-y: auto;
  padding: 24px 28px 60px;
}

.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px;
  margin-bottom: 22px;
}
.page-head h1 {
  font-size: 26px; font-weight: 700; letter-spacing: -.022em;
  margin: 0 0 4px;
}
.page-head .sub { color: var(--text-mid); font-size: 14px; margin: 0; }
.page-head .head-actions { display: flex; gap: 8px; }
.btn-ghost, .btn-solid {
  appearance: none; border: 1px solid var(--line); background: var(--bg-elev);
  color: var(--text); font: inherit; font-size: 13px; font-weight: 600;
  padding: 0 14px; height: 38px; border-radius: 9px;
  display: inline-flex; align-items: center; gap: 8px; cursor: default;
}
.btn-ghost:hover { background: var(--bg-tint); border-color: var(--line-strong); }
.btn-solid {
  background: var(--text); color: var(--bg-elev); border-color: var(--text);
}
.dark .btn-solid { background: #fff; color: #0b0b0f; border-color: #fff; }
.btn-solid:hover { background: color-mix(in oklch, var(--text) 88%, transparent); }

/* KPI Row */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
  margin-bottom: 18px;
}
@media (max-width: 1100px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }

.card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi {
  display: grid;
  grid-template-rows: auto auto auto;
  gap: 8px;
  min-height: 132px;
}
.kpi .lbl {
  display: flex; align-items: center; gap: 8px;
  color: var(--text-mid); font-size: 12.5px; font-weight: 600;
  letter-spacing: .01em;
}
.kpi .lbl .ic { color: var(--text-dim); }
.kpi .num {
  font-size: 30px; font-weight: 700; letter-spacing: -.025em;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.kpi .meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; font-weight: 700;
  padding: 3px 7px; border-radius: 999px;
  font-variant-numeric: tabular-nums;
}
.badge.up { background: color-mix(in oklch, #10b981 14%, transparent); color: #058458; }
.dark .badge.up { color: #34d399; }
.badge.down { background: color-mix(in oklch, #ef4444 14%, transparent); color: #c2410c; }
.dark .badge.down { color: #fca5a5; }

.kpi__spark {
  position: absolute;
  right: 14px; top: 16px;
  width: 96px; height: 36px;
}

.progress {
  width: 100%; height: 8px; border-radius: 999px;
  background: var(--bg-tint); overflow: hidden;
  margin-top: 4px;
}
.progress > div {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), color-mix(in oklch, var(--accent) 60%, #18e0c4));
  transition: width 1.2s cubic-bezier(.2,.7,.2,1);
}

.pulse {
  display: inline-flex; align-items: center; gap: 8px;
  font-weight: 600; color: #059669;
}
.dark .pulse { color: #34d399; }
.pulse-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #10b981; position: relative;
}
.pulse-dot::after {
  content: ""; position: absolute; inset: -2px;
  border-radius: 50%; border: 2px solid #10b981;
  animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse {
  0% { transform: scale(.6); opacity: .9; }
  100% { transform: scale(2.2); opacity: 0; }
}

/* Row 2 */
.row2 {
  display: grid;
  grid-template-columns: minmax(0, 65fr) minmax(0, 35fr);
  gap: 16px;
  margin-bottom: 18px;
}
@media (max-width: 1100px) { .row2 { grid-template-columns: 1fr; } }

.chart-card { padding: 22px 22px 18px; }
.chart-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 8px; }
.chart-head h3 { margin: 0 0 4px; font-size: 16px; font-weight: 700; letter-spacing: -.012em; }
.chart-head .sub { margin: 0; color: var(--text-mid); font-size: 12.5px; }
.chart-head .total { font-size: 28px; font-weight: 700; letter-spacing: -.022em; font-variant-numeric: tabular-nums; }

.seg {
  display: inline-flex; align-items: center;
  background: var(--bg-tint); border-radius: 9px; padding: 3px;
}
.seg button {
  appearance: none; border: 0; background: transparent; cursor: default;
  font: inherit; font-size: 12.5px; font-weight: 600;
  padding: 6px 12px; border-radius: 6px;
  color: var(--text-mid);
}
.seg button.on {
  background: var(--bg-elev);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,.08), 0 0 0 1px var(--line);
}

.chart-wrap {
  position: relative;
  margin-top: 14px;
  height: 280px;
}
.chart-wrap svg { width: 100%; height: 100%; display: block; overflow: visible; }
.chart-legend {
  display: flex; gap: 18px; align-items: center;
  margin-top: 6px;
  font-size: 12px; color: var(--text-mid);
}
.chart-legend .ld { display: flex; align-items: center; gap: 6px; }
.chart-legend .sw { width: 9px; height: 9px; border-radius: 3px; }

.tooltip {
  position: absolute;
  background: var(--text);
  color: var(--bg-elev);
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 12px;
  pointer-events: none;
  transform: translate(-50%, -110%);
  white-space: nowrap;
  box-shadow: var(--shadow-lg);
  z-index: 3;
}
.dark .tooltip { background: #fff; color: #0b0b0f; }
.tooltip .t-row { display: flex; align-items: center; gap: 8px; }
.tooltip .t-row + .t-row { margin-top: 4px; }
.tooltip .t-sw { width: 8px; height: 8px; border-radius: 50%; }
.tooltip .t-val { font-variant-numeric: tabular-nums; font-weight: 700; }
.tooltip::after {
  content: ""; position: absolute;
  left: 50%; transform: translateX(-50%);
  bottom: -5px; width: 10px; height: 10px;
  background: var(--text); rotate: 45deg;
}
.dark .tooltip::after { background: #fff; }

/* Feed */
.feed { padding: 22px 0 16px; }
.feed h3 { margin: 0 22px 8px; font-size: 16px; font-weight: 700; letter-spacing: -.012em; }
.feed .feed-sub { margin: 0 22px 14px; color: var(--text-mid); font-size: 12.5px; }
.feed-list { display: flex; flex-direction: column; }
.feed-item {
  display: grid;
  grid-template-columns: 14px 1fr auto;
  gap: 12px;
  padding: 12px 22px;
  align-items: flex-start;
  cursor: default;
}
.feed-item:hover { background: var(--bg-tint); }
.feed-item + .feed-item { border-top: 1px solid var(--line); }
.feed-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex: none; }
.feed-dot.red { background: #ef4444; box-shadow: 0 0 0 4px color-mix(in oklch, #ef4444 16%, transparent); }
.feed-dot.amber { background: #f59e0b; box-shadow: 0 0 0 4px color-mix(in oklch, #f59e0b 16%, transparent); }
.feed-dot.blue { background: #3b82f6; box-shadow: 0 0 0 4px color-mix(in oklch, #3b82f6 16%, transparent); }
.feed-dot.green { background: #10b981; box-shadow: 0 0 0 4px color-mix(in oklch, #10b981 16%, transparent); }
.feed-item .title { font-size: 13.5px; font-weight: 600; line-height: 1.35; }
.feed-item .meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.feed-item .time { font-size: 11.5px; color: var(--text-dim); font-variant-numeric: tabular-nums; white-space: nowrap; }

/* Table */
.table-card { padding: 0; overflow: hidden; }
.table-head {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 18px 22px 12px;
}
.table-head h3 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: -.012em; }
.table-head .sub { margin: 2px 0 0; color: var(--text-mid); font-size: 12.5px; }
.table-filter {
  display: inline-flex; gap: 6px; align-items: center;
}
.chip {
  font-size: 12px; font-weight: 600;
  padding: 6px 10px; border-radius: 8px;
  background: var(--bg-tint); color: var(--text-mid); cursor: default;
  border: 1px solid transparent;
}
.chip:hover { background: var(--bg-deep); color: var(--text); }
.chip.on {
  background: var(--bg-elev); color: var(--text);
  border-color: var(--line-strong);
}

.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
}
.tbl thead th {
  text-align: left;
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 12px 14px;
  background: var(--bg-tint);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
}
.tbl tbody td {
  padding: 14px 14px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  white-space: nowrap;
}
.tbl tbody tr:last-child td { border-bottom: 0; }
.tbl tbody tr:hover { background: var(--bg-tint); }
.tbl tbody td:first-child, .tbl thead th:first-child { padding-left: 22px; }
.tbl tbody td:last-child, .tbl thead th:last-child { padding-right: 22px; text-align: right; }
.id-cell {
  font-family: "JetBrains Mono", monospace;
  font-size: 12.5px; color: var(--text-mid);
}
.cust { display: flex; align-items: center; gap: 10px; }
.cust .ava {
  width: 30px; height: 30px; border-radius: 50%;
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 11px;
  flex: none;
}
.cust .nm { font-weight: 600; }
.cust .em { font-size: 11.5px; color: var(--text-dim); }

.pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 700;
  padding: 4px 9px;
  border-radius: 999px;
  letter-spacing: .01em;
}
.pill::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}
.pill.success { background: color-mix(in oklch, #10b981 14%, transparent); color: #047857; }
.pill.pending { background: color-mix(in oklch, #f59e0b 16%, transparent); color: #b45309; }
.pill.failed  { background: color-mix(in oklch, #ef4444 14%, transparent); color: #b91c1c; }
.pill.refund  { background: var(--bg-tint); color: var(--text-mid); }
.dark .pill.success { color: #34d399; }
.dark .pill.pending { color: #fbbf24; }
.dark .pill.failed  { color: #fca5a5; }

.amount { font-variant-numeric: tabular-nums; font-weight: 600; }

.row-menu-wrap { position: relative; }
.row-menu-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 0; background: transparent; color: var(--text-mid); cursor: default;
  display: inline-grid; place-items: center;
}
.row-menu-btn:hover { background: var(--bg-tint); color: var(--text); }
.row-menu {
  position: absolute; right: 0; top: calc(100% + 4px);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  padding: 6px;
  min-width: 180px;
  z-index: 10;
}
.row-menu button {
  width: 100%;
  appearance: none; border: 0; background: transparent;
  color: var(--text); font: inherit; font-size: 13px; font-weight: 500;
  padding: 8px 10px; border-radius: 7px;
  text-align: left; cursor: default;
  display: flex; align-items: center; gap: 10px;
}
.row-menu button:hover { background: var(--bg-tint); }
.row-menu button.danger { color: #dc2626; }
.dark .row-menu button.danger { color: #fca5a5; }

/* Skeletons */
.skel {
  background: linear-gradient(90deg,
    color-mix(in oklch, var(--text) 6%, transparent) 0%,
    color-mix(in oklch, var(--text) 12%, transparent) 50%,
    color-mix(in oklch, var(--text) 6%, transparent) 100%);
  background-size: 200% 100%;
  border-radius: 6px;
  animation: shimmer 1.4s infinite linear;
  display: inline-block;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* Notif panel */
.popover {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 340px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 20;
  overflow: hidden;
}
.popover-h {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
}
.popover-h h4 { margin: 0; font-size: 14px; font-weight: 700; }
.popover-h .mark { font-size: 12px; color: var(--accent); cursor: default; }
.popover-list .feed-item { padding: 12px 16px; }

/* fade transition */
.fade-enter { opacity: 0; transform: translateY(6px); }
.fade-enter-active { opacity: 1; transform: translateY(0); transition: all .3s ease; }
</style>

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip>span>i:first-child{box-shadow:none}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

/* ─── Sparkline ────────────────────────────────────────────────── */
function Spark({ data, w = 96, h = 36, color = "currentColor", area = true }) {
  const max = Math.max(...data), min = Math.min(...data);
  const pad = 3;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
    return [x, y];
  });
  const path = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const areaPath = path + ` L${pts[pts.length-1][0]} ${h} L${pts[0][0]} ${h} Z`;
  const id = useMemo(() => "spk" + Math.random().toString(36).slice(2, 8), []);
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <defs>
        <linearGradient id={id} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".35" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {area && <path d={areaPath} fill={`url(#${id})`} />}
      <path d={path} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

/* ─── Animated number ───────────────────────────────────────────── */
function useCountUp(target, duration = 1100) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf, start;
    const from = 0;
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setN(from + (target - from) * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return n;
}

  const xOf = (i) => padL + (i / (s1.length - 1)) * (W - padL - padR);

  function onMove(e) {

    const x = ((e.clientX - rect.left) / rect.width) * W;
    const i = Math.round(((x - padL) / (W - padL - padR)) * (s1.length - 1));

          ))}

          {labels.map((l, i) => (
            <text key={i} x={xOf(i)} y={H - padB + 16} fontSize="11" textAnchor="middle"
                  fill="var(--text-dim)" fontFamily="JetBrains Mono">{l}</text>

          <path d={areaOf(s1)} fill="url(#g1)" />

          <path d={pathOf(s1)} fill="none" stroke="var(--accent)" strokeWidth="2.6"
                strokeLinecap="round" strokeLinejoin="round" />

          {/* hover */}
          {hover && (
            <g>
              <line x1={xOf(hover.i)} x2={xOf(hover.i)} y1={padT} y2={H - padB}
                    stroke="var(--text-mid)" strokeDasharray="3 4" strokeWidth="1" />

          {["All", "Success", "Pending", "Failed"].map((f) => (

      </div>

      <table className="tbl">
        <thead>
          <tr>
            <th>Invoice</th>
            <th>Customer</th>
            <th>Plan</th>
            <th>Status</th>
            <th>Method</th>
            <th>Date</th>
            <th style={{ textAlign: "right" }}>Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={r.id}>
              <td className="id-cell mono">{r.id}</td>
              <td>
                <div className="cust">
                  <div className="ava" style={{ background: AV_COLORS[i % AV_COLORS.length] }}>{initials(r.name)}</div>
                  <div>
                    <div className="nm">{r.name}</div>
                    <div className="em">{r.email}</div>
                  </div>
                </div>
              </td>
              <td style={{ color: "var(--text-mid)" }}>{r.plan}</td>
              <td>
                <span className={"pill " + (
                  r.status === "success" ? "success" :
                  r.status === "pending" ? "pending" :
                  r.status === "failed" ? "failed" : "refund"
                )}>
                  {r.status === "success" ? "Paid" :
                   r.status === "pending" ? "Pending" :
                   r.status === "failed" ? "Failed" : "Refunded"}

              </td>
              <td style={{ color: "var(--text-mid)" }}>{r.method}</td>
              <td style={{ color: "var(--text-mid)" }}>{r.date}</td>
              <td className="amount" style={{ textAlign: "right", color: r.amount < 0 ? "#dc2626" : "inherit" }}>
                {r.amount < 0 ? "−" : ""}${Math.abs(r.amount).toLocaleString()}

              <td>
                <div className="row-menu-wrap">
                  <button className="row-menu-btn" onClick={() => setOpenMenu(openMenu === r.id ? null : r.id)}>
                    <window.Icons.IcMore size={16} />
                  </button>
                  {openMenu === r.id && <RowMenu onClose={() => setOpenMenu(null)} />}

      </table>
    </div>

}

/* ─── Notification panel ────────────────────────────────────────── */
const NOTIFS = [
  { dot: "red",   title: "p95 latency exceeded threshold", meta: "checkout-api · 2 min ago" },
  { dot: "blue",  title: "Idris approved your design review", meta: "Project Atlas · 11 min ago" },
  { dot: "green", title: "Weekly forecast ready",            meta: "Insights · 1 hour ago" },
  { dot: "amber", title: "Billing: card expires next month", meta: "Settings · today" },
];
function NotifPopover({ onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener("mousedown", h), 0);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  return (
    <div className="popover" ref={ref}>
      <div className="popover-h">
        <h4>Notifications</h4>
        <span className="mark">Mark all read</span>
      </div>
      <div className="popover-list">
        {NOTIFS.map((n, i) => (
          <div className="feed-item" key={i}>
            <span className={"feed-dot " + n.dot} />
            <div>
              <div className="title">{n.title}</div>
              <div className="meta">{n.meta}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── Topbar ────────────────────────────────────────────────────── */
function Topbar({ collapsed, setCollapsed, onLogout }) {
  const { IcMenu, IcSearch, IcBell, IcDownload, IcPlus } = window.Icons;
  const [notif, setNotif] = useState(false);
  const [menu, setMenu] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setMenu(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  return (
    <header className="topbar">
      <button className="collapse-btn" onClick={() => setCollapsed(!collapsed)} aria-label="Toggle sidebar">
        <IcMenu size={18} />
      </button>

      <label className="search">
        <IcSearch size={16} />
        <input placeholder="Search anything, metrics, users..." />
        <span className="kbd">⌘K</span>
      </label>

      <div className="top-actions" style={{ marginLeft: "auto" }}>
        <button className="btn-ghost"><IcDownload size={15} /> Export</button>
        <button className="btn-solid"><IcPlus size={15} /> New project</button>
        <div style={{ width: 8 }} />
        <div style={{ position: "relative" }}>
          <button className="icon-btn" onClick={() => setNotif((s) => !s)}>
            <IcBell size={18} />
            <span className="dot" />
          </button>
          {notif && <NotifPopover onClose={() => setNotif(false)} />}
        </div>
        <div style={{ position: "relative" }} ref={ref}>
          <button className="av-btn" onClick={() => setMenu((m) => !m)}>EV</button>
          {menu && (
            <div className="row-menu" style={{ right: 0, top: "calc(100% + 8px)", minWidth: 220 }}>
              <button>👤  Profile</button>
              <button>⚙  Account settings</button>
              <button>🌓  Switch theme</button>
              <button>?  Help & docs</button>
              <button className="danger" onClick={onLogout}>↩  Sign out</button>
            </div>
          )}
        </div>
      </div>
    </header>
  );
}

window.Dashboard = Dashboard;
  </script>

  <script type="text/babel" data-presets="react">
(function () {
  const { useState, useEffect } = React;

  function App() {
    const [t, setTweak] = useTweaks(window.__TWEAK_DEFAULTS);

    const [authed, setAuthed] = useState(t.screen === "dashboard");
    const [user, setUser] = useState({ email: "eliot@arcfield.io", firstName: "Eliot" });
    const [collapsed, setCollapsed] = useState(t.sidebarCollapsed);

    useEffect(() => {
      document.documentElement.classList.toggle("dark", !!t.dark);
      document.documentElement.style.setProperty("--accent", t.accent);
      document.documentElement.setAttribute("data-density", t.density);
    }, [t.dark, t.accent, t.density]);

    useEffect(() => setCollapsed(t.sidebarCollapsed), [t.sidebarCollapsed]);

    function handleSignIn({ email }) {
      const firstName = email.split("@")[0].split(".")[0].replace(/^./, (c) => c.toUpperCase());
      setUser({ email, firstName });
      setAuthed(true);
      setTweak("screen", "dashboard");
    }

    function handleLogout() {
      setAuthed(false);
      setTweak("screen", "login");
    }

    return (
      <>
        {authed ? (
          <Dashboard
            user={user}
            collapsed={collapsed}
            setCollapsed={(v) => { setCollapsed(v); setTweak("sidebarCollapsed", v); }}
            onLogout={handleLogout}
          />
        ) : (
          <LoginScreen onSignIn={handleSignIn} />
        )}

        <TweaksPanel>
          <TweakSection label="Navigation" />
          <TweakRadio
            label="Screen"
            value={t.screen}
            options={["login", "dashboard"]}
            onChange={(v) => {
              setTweak("screen", v);
              setAuthed(v === "dashboard");
            }}
          />

          <TweakSection label="Theme" />
          <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak("dark", v)} />
          <TweakColor
            label="Accent"
            value={t.accent}
            options={["#5b5bf6", "#0ea5e9", "#10b981", "#f97316", "#ec4899", "#8b5cf6"]}
            onChange={(v) => setTweak("accent", v)}
          />

          <TweakSection label="Layout" />
          <TweakRadio
            label="Density"
            value={t.density}
            options={["compact", "regular", "comfy"]}
            onChange={(v) => setTweak("density", v)}
          />
          <TweakToggle
            label="Collapsed sidebar"
            value={t.sidebarCollapsed}
            onChange={(v) => setTweak("sidebarCollapsed", v)}
          />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();
  </script>
</body>
