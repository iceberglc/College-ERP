{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-card">
  <div class="page-card-header">
    <i class="fas fa-book"></i>
    <div>
      <div class="page-card-title">{{ page_title }}</div>
      <div class="page-card-subtitle">Add a new book to the library catalogue.</div>
    </div>
  </div>
  {% include "main_app/form_template.html" with messages=messages form=form button_text=page_title %}
</div>
{% endblock %}
