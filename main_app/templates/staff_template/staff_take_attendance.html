{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block custom_css %}
<style>
  .att-wrap { max-width: 900px; margin: 0 auto; }

  .filter-card {
    background: var(--ice-surface);
    border: 1px solid var(--ice-border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(27,63,122,.06);
  }
  .filter-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ice-text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-card-title i { color: var(--ice-cyan); }

  .roster-card {
    background: var(--ice-surface);
    border: 1px solid var(--ice-border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(27,63,122,.06);
    margin-bottom: 20px;
  }
  .roster-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--ice-surface2);
    border-bottom: 1px solid var(--ice-border);
    flex-wrap: wrap;
    gap: 10px;
  }
  .roster-title { font-size: 14px; font-weight: 600; color: var(--ice-text); }

  .bulk-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .bulk-btn {
    padding: 5px 14px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .bulk-btn:hover { opacity: .85; }
  .bulk-present { background: rgba(16,185,129,.12); color: var(--ice-success); }
  .bulk-late    { background: rgba(245,158,11,.12);  color: var(--ice-warning); }
  .bulk-absent  { background: rgba(239,68,68,.12);   color: var(--ice-danger); }

  .roster-student {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--ice-border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .roster-student:last-child { border-bottom: none; }
  .student-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--ice-text);
    flex: 1;
    min-width: 150px;
  }

  .status-btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-btn {
    border: 1.5px solid var(--ice-border);
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    background: var(--ice-surface2);
    color: var(--ice-muted);
    transition: all .15s;
  }
  .status-btn:hover { border-color: var(--ice-cyan); color: var(--ice-cyan); }
  .status-btn.active-present { background: rgba(16,185,129,.12); color: var(--ice-success); border-color: var(--ice-success); }
  .status-btn.active-late    { background: rgba(245,158,11,.12);  color: var(--ice-warning); border-color: var(--ice-warning); }
  .status-btn.active-absent  { background: rgba(239,68,68,.12);   color: var(--ice-danger);  border-color: var(--ice-danger); }

  .roster-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--ice-border);
    background: var(--ice-surface2);
  }
  .att-summary { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .att-chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .att-chip.present { background: rgba(16,185,129,.12); color: var(--ice-success); }
  .att-chip.late    { background: rgba(245,158,11,.12);  color: var(--ice-warning); }
  .att-chip.absent  { background: rgba(239,68,68,.12);   color: var(--ice-danger); }
</style>
{% endblock custom_css %}

{% block content %}
<div class="att-wrap">

  <!-- Filter Card -->
  <div class="filter-card">
    <div class="filter-card-title">
      <i class="fas fa-clipboard-check"></i> {{ page_title }}
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label" style="font-size:12px; font-weight:600; color:var(--ice-muted); text-transform:uppercase; letter-spacing:.4px;">
          <i class="fas fa-book me-1"></i> Course / Program
        </label>
        <select id="course_sel" class="form-control">
          <option value="">— All Courses —</option>
          {% for c in courses %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label" style="font-size:12px; font-weight:600; color:var(--ice-muted); text-transform:uppercase; letter-spacing:.4px;">
          <i class="fas fa-chalkboard-teacher me-1"></i> Teacher
        </label>
        <select id="teacher_sel" class="form-control" disabled>
          <option value="">— Select Course first —</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label" style="font-size:12px; font-weight:600; color:var(--ice-muted); text-transform:uppercase; letter-spacing:.4px;">
          <i class="fas fa-layer-group me-1"></i> Group <span style="color:var(--ice-danger)">*</span>
        </label>
        <select id="group" class="form-control" disabled>
          <option value="">— Select Teacher first —</option>
        </select>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-md-4">
        <label class="form-label" style="font-size:12px; font-weight:600; color:var(--ice-muted); text-transform:uppercase; letter-spacing:.4px;">
          <i class="fas fa-calendar-day me-1"></i> Date
        </label>
        <input type="date" id="attendance_date" class="form-control" value="{{ today }}" max="{{ today }}">
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button type="button" id="fetch_btn" class="btn btn-primary w-100" disabled>
          <i class="fas fa-users me-1"></i> Load Students
        </button>
      </div>
    </div>
  </div>

  <!-- Roster Card -->
  <div id="roster_card" class="roster-card" style="display:none;">
    <div class="roster-header">
      <div class="roster-title" id="roster_title">Mark Attendance</div>
      <div class="bulk-btns">
        <button type="button" class="bulk-btn bulk-present" onclick="markAll(1)"><i class="fas fa-check me-1"></i>All Present</button>
        <button type="button" class="bulk-btn bulk-late" onclick="markAll(2)"><i class="fas fa-clock me-1"></i>All Late</button>
        <button type="button" class="bulk-btn bulk-absent" onclick="markAll(0)"><i class="fas fa-times me-1"></i>All Absent</button>
      </div>
    </div>

    <div id="student_list"></div>

    <div class="roster-footer">
      <div class="att-summary">
        <span class="att-chip present"><i class="fas fa-check-circle me-1"></i>Present: <strong id="cnt_p">0</strong></span>
        <span class="att-chip late"><i class="fas fa-clock me-1"></i>Late: <strong id="cnt_l">0</strong></span>
        <span class="att-chip absent"><i class="fas fa-times-circle me-1"></i>Absent: <strong id="cnt_a">0</strong></span>
      </div>
      <button type="button" id="save_btn" class="btn btn-success w-100">
        <i class="fas fa-save me-1"></i> Save Attendance
      </button>
      <div id="save_msg" class="mt-3"></div>
    </div>
  </div>

</div>
{% endblock %}

{% block custom_js %}
<script>
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] ?? '';
const STATUS_CLASS = {0: 'active-absent', 1: 'active-present', 2: 'active-late'};

function updateSummary() {
  let p = 0, l = 0, a = 0;
  document.querySelectorAll('.student-status').forEach(inp => {
    const v = parseInt(inp.value);
    if (v === 1) p++; else if (v === 2) l++; else a++;
  });
  document.getElementById('cnt_p').textContent = p;
  document.getElementById('cnt_l').textContent = l;
  document.getElementById('cnt_a').textContent = a;
}

function setStatus(row, status) {
  row.querySelector('input.student-status').value = status;
  row.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active-present','active-late','active-absent'));
  row.querySelector(`.status-btn[data-status="${status}"]`).classList.add(STATUS_CLASS[status]);
  updateSummary();
}

function markAll(status) {
  document.querySelectorAll('#student_list .roster-student').forEach(r => setStatus(r, status));
}

document.getElementById('course_sel').addEventListener('change', function () {
  const courseId = this.value;
  const teacherSel = document.getElementById('teacher_sel');
  const groupSel = document.getElementById('group');
  const fetchBtn = document.getElementById('fetch_btn');

  teacherSel.innerHTML = '<option value="">— Loading… —</option>';
  teacherSel.disabled = true;
  groupSel.innerHTML = '<option value="">— Select Teacher first —</option>';
  groupSel.disabled = true;
  fetchBtn.disabled = true;

  if (!courseId) {
    teacherSel.innerHTML = '<option value="">— Select Course first —</option>';
    return;
  }

  fetch("{% url 'staff_get_teachers_for_course' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ course_id: courseId })
  })
  .then(r => r.json())
  .then(d => {
    if (!d.teachers.length) {
      teacherSel.innerHTML = '<option value="">No teachers for this course</option>';
      return;
    }
    teacherSel.innerHTML = '<option value="">— All Teachers —</option>' +
      d.teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    teacherSel.disabled = false;
    loadGroups(null, courseId);
  })
  .catch(() => { teacherSel.innerHTML = '<option value="">Error loading teachers</option>'; });
});

document.getElementById('teacher_sel').addEventListener('change', function () {
  const teacherId = this.value;
  const courseId  = document.getElementById('course_sel').value;
  loadGroups(teacherId || null, teacherId ? null : courseId);
});

function loadGroups(teacherId, courseId) {
  const groupSel = document.getElementById('group');
  const fetchBtn = document.getElementById('fetch_btn');
  groupSel.innerHTML = '<option value="">— Loading… —</option>';
  groupSel.disabled = true;
  fetchBtn.disabled = true;

  const params = {};
  if (teacherId) params.teacher_id = teacherId;
  else if (courseId) params.course_id = courseId;

  fetch("{% url 'staff_get_groups_for_teacher' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams(params)
  })
  .then(r => r.json())
  .then(d => {
    if (!d.groups.length) {
      groupSel.innerHTML = '<option value="">No groups found</option>';
      return;
    }
    groupSel.innerHTML = '<option value="">— Select a group —</option>' +
      d.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    groupSel.disabled = false;
  })
  .catch(() => { groupSel.innerHTML = '<option value="">Error loading groups</option>'; });
}

document.getElementById('group').addEventListener('change', function () {
  document.getElementById('fetch_btn').disabled = !this.value;
});

document.getElementById('fetch_btn').addEventListener('click', function () {
  const group   = document.getElementById('group').value;
  const attDate = document.getElementById('attendance_date').value;
  if (!group)   { alert('Please select a group first.'); return; }
  if (!attDate) { alert('Please select a date.'); return; }

  this.disabled = true;
  this.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Loading…';

  fetch("{% url 'get_students' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group })
  })
  .then(r => r.json())
  .then(data => {
    const arr = typeof data === 'string' ? JSON.parse(data) : data;
    document.getElementById('fetch_btn').disabled = false;
    document.getElementById('fetch_btn').innerHTML = '<i class="fas fa-users me-1"></i> Load Students';

    if (!arr.length) { alert('No enrolled students in this group.'); return; }

    document.getElementById('student_list').innerHTML = arr.map(s => `
      <div class="roster-student" data-id="${s.id}">
        <div class="student-name">
          <i class="fas fa-user-graduate me-2" style="color:var(--ice-cyan);"></i>${s.name}
        </div>
        <div class="status-btn-group">
          <button type="button" class="status-btn active-present" data-status="1" onclick="setStatus(this.closest('.roster-student'),1)">Present</button>
          <button type="button" class="status-btn" data-status="2" onclick="setStatus(this.closest('.roster-student'),2)">Late</button>
          <button type="button" class="status-btn" data-status="0" onclick="setStatus(this.closest('.roster-student'),0)">Absent</button>
        </div>
        <input type="hidden" class="student-status" value="1">
      </div>`).join('');

    const grpOpt = document.getElementById('group').selectedOptions[0].text;
    document.getElementById('roster_title').textContent = `${grpOpt} · ${attDate} — ${arr.length} students`;
    document.getElementById('roster_card').style.display = 'block';
    document.getElementById('save_btn').style.display = '';
    document.getElementById('save_msg').innerHTML = '';
    updateSummary();
  })
  .catch(() => {
    document.getElementById('fetch_btn').disabled = false;
    document.getElementById('fetch_btn').innerHTML = '<i class="fas fa-users me-1"></i> Load Students';
    alert('Error loading students.');
  });
});

document.getElementById('save_btn').addEventListener('click', function () {
  const group   = document.getElementById('group').value;
  const attDate = document.getElementById('attendance_date').value;
  const rows    = document.querySelectorAll('#student_list .roster-student');
  if (!rows.length) return;

  const student_ids = JSON.stringify(
    Array.from(rows).map(r => ({
      id:     parseInt(r.dataset.id),
      status: parseInt(r.querySelector('input.student-status').value),
    }))
  );

  this.disabled = true;
  this.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Saving…';

  fetch("{% url 'save_attendance' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group, date: attDate, student_ids })
  })
  .then(r => r.text())
  .then(resp => {
    if (resp === 'OK') {
      document.getElementById('save_msg').innerHTML =
        '<div class="alert alert-success mb-0"><i class="fas fa-check-circle me-2"></i>Attendance saved! Students have been notified.</div>';
      document.getElementById('save_btn').style.display = 'none';
    } else {
      document.getElementById('save_msg').innerHTML =
        '<div class="alert alert-danger mb-0">Error saving attendance. Please try again.</div>';
      this.disabled = false;
      this.innerHTML = '<i class="fas fa-save me-1"></i> Save Attendance';
    }
  })
  .catch(() => {
    document.getElementById('save_msg').innerHTML =
      '<div class="alert alert-danger mb-0">Network error. Please try again.</div>';
    this.disabled = false;
    this.innerHTML = '<i class="fas fa-save me-1"></i> Save Attendance';
  });
});
</script>
{% endblock %}
