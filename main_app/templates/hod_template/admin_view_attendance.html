{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block content %}
<div style="max-width:900px; margin:0 auto; display:grid; gap:20px;">

  <!-- Filter Card -->
  <div class="dt-card">
    <div class="dt-header">
      <div class="dt-title"><i class="fas fa-search me-2"></i>{{ page_title }}</div>
    </div>
    <div style="padding:20px;">
      <label class="pf-label"><i class="fas fa-layer-group me-1"></i>Select Group</label>
      <select id="group" class="form-control" style="border-radius:9px; border:1.5px solid var(--ice-border); margin-bottom:14px;">
        <option value="">— Choose a group —</option>
        {% for g in groups %}
        <option value="{{ g.id }}">{{ g.name }}{% if g.teacher %} · {{ g.teacher }}{% endif %}</option>
        {% endfor %}
      </select>
      <button type="button" id="fetch_dates_btn" class="btn btn-primary" style="width:100%;">
        <i class="fas fa-calendar-alt me-1"></i> Load Attendance Dates
      </button>
    </div>

    <div id="date_section" style="display:none; padding:0 20px 20px; border-top:1px solid var(--ice-border); padding-top:16px;">
      <label class="pf-label"><i class="fas fa-calendar-day me-1"></i>Attendance Date</label>
      <select id="attendance_date" class="form-control" style="border-radius:9px; border:1.5px solid var(--ice-border); margin-bottom:12px;"></select>
      <button type="button" id="fetch_students_btn" class="btn btn-secondary" style="width:100%;">
        <i class="fas fa-users me-1"></i> View Attendance for this Date
      </button>
    </div>
  </div>

  <!-- Results Card -->
  <div id="student_section" class="dt-card" style="display:none;">
    <div class="dt-header">
      <div class="dt-title"><i class="fas fa-clipboard-list me-2"></i>Attendance Results</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <span class="sb sb-success">Present: <strong id="cnt_present">0</strong></span>
        <span class="sb sb-warning">Late: <strong id="cnt_late">0</strong></span>
        <span class="sb sb-danger">Absent: <strong id="cnt_absent">0</strong></span>
      </div>
    </div>
    <div id="student_data" style="padding:16px 20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px;"></div>
  </div>

</div>
{% endblock %}

{% block custom_js %}
<style>
.att-card {
  border-radius: 10px; padding: 12px 10px; text-align: center;
  color: #fff; font-size: 12px; line-height: 1.4;
}
.att-present { background: linear-gradient(135deg,#10B981,#059669); }
.att-late    { background: linear-gradient(135deg,#F59E0B,#D97706); }
.att-absent  { background: linear-gradient(135deg,#EF4444,#DC2626); }
</style>
<script>
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] ?? '';

document.getElementById('fetch_dates_btn').addEventListener('click', function () {
  const group = document.getElementById('group').value;
  if (!group) { alert('Please select a group.'); return; }

  fetch("{% url 'get_admin_attendance' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group })
  })
  .then(r => r.json())
  .then(data => {
    const arr = JSON.parse(data);
    if (!arr.length) { alert('No attendance records for this group yet.'); return; }
    const sel = document.getElementById('attendance_date');
    sel.innerHTML = arr.map(a => `<option value="${a.id}">${a.attendance_date}</option>`).join('');
    document.getElementById('date_section').style.display = 'block';
    document.getElementById('student_section').style.display = 'none';
  })
  .catch(() => alert('Error loading dates.'));
});

document.getElementById('fetch_students_btn').addEventListener('click', function () {
  const attendance_date_id = document.getElementById('attendance_date').value;
  if (!attendance_date_id) { alert('Please select a date.'); return; }

  fetch("{% url 'get_admin_attendance' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ attendance_date_id })
  })
  .then(r => r.json())
  .then(data => {
    const arr = JSON.parse(data);
    if (!arr.length) { alert('No student data for this date.'); return; }
    let present = 0, late = 0, absent = 0, html = '';
    arr.forEach(s => {
      const st = parseInt(s.status, 10);
      let cls, label;
      if (st === 1)      { cls = 'att-present'; label = 'Present'; present++; }
      else if (st === 2) { cls = 'att-late';    label = 'Late';    late++;    }
      else               { cls = 'att-absent';  label = 'Absent';  absent++;  }
      html += `<div class="att-card ${cls}">
        <i class="fas fa-user mb-1 d-block" style="font-size:20px; opacity:.9;"></i>
        <strong>${s.name}</strong>
        <div style="font-size:11px; opacity:.85; margin-top:2px;">${label}</div>
      </div>`;
    });
    document.getElementById('student_data').innerHTML = html;
    document.getElementById('cnt_present').textContent = present;
    document.getElementById('cnt_late').textContent    = late;
    document.getElementById('cnt_absent').textContent  = absent;
    document.getElementById('student_section').style.display = 'block';
  })
  .catch(() => alert('Error loading attendance.'));
});
</script>
{% endblock %}
