{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Adaptive platform look (Apple glass / Android+other solid) — must run before paint -->
    <script src="{% static 'dist/js/platform-detect.js' %}"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ICEBERG - Account Recovery</title>
  <link rel="shortcut icon" href="{% static 'image/favicon1.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --surface: #ffffff;
      --text: #111827;
      --muted: #667085;
      --border: #dbe3ef;
      --primary: #0C1F45;
      --primary-dark: #071833;
      --secondary: #0891B2;
      --cyan: #06B6D4;
      --cyan-dk: #0891B2;
    }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-right: max(18px, env(safe-area-inset-right));
      padding-bottom: max(28px, env(safe-area-inset-bottom));
      padding-left: max(18px, env(safe-area-inset-left));
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(6, 182, 212, .16), transparent 24rem),
        radial-gradient(circle at 86% 14%, rgba(12, 31, 69, .12), transparent 22rem),
        linear-gradient(180deg, #F8FBFF 0%, #EEF4FB 100%);
    }
    .card {
      width: min(460px, 100%);
      padding: 40px;
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(226, 232, 240, .88);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(12, 31, 69, .14), 0 2px 8px rgba(12, 31, 69, .06);
    }
    @supports ((-webkit-backdrop-filter: blur(2px)) or (backdrop-filter: blur(2px))) {
      html.platform-apple .card {
        background: rgba(255, 255, 255, .90);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        backdrop-filter: blur(16px) saturate(150%);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,.74),
          0 24px 70px rgba(12, 31, 69, .14),
          0 2px 8px rgba(12, 31, 69, .06);
      }
    }
    .brand-hero {
      margin-bottom: 30px;
      text-align: center;
    }
    .brand-mark {
      width: 54px;
      height: 54px;
      margin: 0 auto 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 18px 34px rgba(6, 182, 212, .20);
      position: relative;
      overflow: hidden;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,.62);
    }
    .brand-name {
      color: var(--text);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .12em;
    }
    .brand-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .22em;
    }
    h2 {
      margin-bottom: 8px;
      color: var(--text);
      font-size: 26px;
      font-weight: 800;
      line-height: 1.15;
    }
    .subtitle,
    .login-box-msg {
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .alert {
      padding: 12px 14px;
      border: 1px solid;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .alert-danger { background:#fef2f2; color:#991b1b; border-color:#fecaca; }
    .alert-success { background:#f0fdf4; color:#166534; border-color:#bbf7d0; }
    .alert-warning { background:#fffbeb; color:#92400e; border-color:#fde68a; }
    .alert-info { background:#eff6ff; color:#1e40af; border-color:#bfdbfe; }
    .field,
    .form-group {
      margin-bottom: 18px;
    }
    label,
    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"],
    .form-group input {
      width: 100%;
      min-height: 46px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus,
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(6, 182, 212, .16);
    }
    .text-danger {
      color: #991b1b;
      display: block;
      font-size: 12px;
      margin-top: 5px;
    }
    .btn-primary,
    button[type="submit"],
    input[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      padding: 11px 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      font: inherit;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(6, 101, 144, .24);
      transition: transform .12s, filter .15s;
    }
    .btn-primary:hover,
    button[type="submit"]:hover {
      color: #fff;
      filter: brightness(.97);
      transform: translateY(-1px);
      text-decoration: none;
    }
    .btn-outline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      padding: 10px 16px;
      border: 1px solid var(--primary);
      border-radius: 13px;
      background: transparent;
      color: var(--primary-dark);
      font: inherit;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
    }
    .btn-outline:hover {
      background: #eff6ff;
      text-decoration: none;
    }
    .link {
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
    .text-center { text-align: center; }
    .mt-3 { margin-top: 16px; }
    .mt-4 { margin-top: 24px; }
    .mb-3 { margin-bottom: 16px; }
    .mb-4 { margin-bottom: 24px; }
    .state-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .text-success { color: #166534; }
    .text-warning { color: #92400e; }
    .text-muted { color: var(--muted); }
    .card-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }
    @media (max-width: 480px) {
      body {
        align-items: start;
        padding-top: max(18px, env(safe-area-inset-top));
      }
      .card {
        min-height: auto;
        border-radius: 22px;
        padding: 34px 24px 28px;
      }
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #0E1D34;
        --text: #E6EDF7;
        --muted: #A8B7C8;
        --border: rgba(255,255,255,.12);
      }
      body {
        background:
          radial-gradient(circle at 18% 10%, rgba(103, 232, 249, .11), transparent 24rem),
          radial-gradient(circle at 86% 14%, rgba(59, 130, 246, .10), transparent 22rem),
          linear-gradient(180deg, #0A1728 0%, #07101D 100%);
      }
      .card {
        background: rgba(14,29,52,.96);
        border-color: rgba(255,255,255,.12);
        box-shadow: 0 24px 70px rgba(0,0,0,.42), 0 2px 8px rgba(0,0,0,.28);
      }
      input[type="email"],
      input[type="password"],
      input[type="text"],
      .form-group input {
        background: rgba(19,36,64,.96);
        border-color: rgba(255,255,255,.13);
        color: var(--text);
      }
      input:focus,
      .form-group input:focus {
        background: rgba(14,29,52,.98);
      }
      .btn-outline:hover { background: rgba(103,232,249,.08); }
      .card-footer { border-top-color: rgba(255,255,255,.10); }
    }
    @media (prefers-reduced-transparency: reduce) {
      .card {
        -webkit-backdrop-filter: none !important;
        backdrop-filter: none !important;
        background: var(--surface) !important;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-hero">
      <div class="brand-mark" aria-hidden="true"></div>
      <div class="brand-name">ICEBERG</div>
      <div class="brand-sub">STUDY CENTER</div>
    </div>

    {% block content %}{% endblock %}

    <div class="card-footer">
      &copy; {% now "Y" %} Iceberg Study Center
    </div>
  </div>
</body>
</html>
