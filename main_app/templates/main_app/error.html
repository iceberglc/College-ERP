{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Adaptive platform look (Apple glass / Android+other solid) — must run before paint -->
    <script src="{% static 'dist/js/platform-detect.js' %}"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ error_code }} · Iceberg Study Center</title>
  <link rel="shortcut icon" href="{% static 'image/favicon1.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #DDEAFB 0%, #ECF3FC 50%, #FAFCFF 100%);
      color: #0C1F45;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border: 1px solid rgba(216,227,242,.7);
      border-radius: 20px;
      padding: 44px 36px 36px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(12,31,69,.10);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1B3F7A, #0C1F45);
      color: #fff;
      margin: 0 auto 18px;
      box-shadow: 0 8px 18px rgba(12,31,69,.18);
    }
    .badge svg { width: 32px; height: 32px; }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 700;
      color: #0C1F45;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      color: #0C1F45;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 14px;
      color: #64748B;
      line-height: 1.55;
      margin-bottom: 26px;
    }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 18px;
      font-size: 13.5px;
      font-weight: 600;
      border-radius: 10px;
      text-decoration: none;
      transition: transform .12s, box-shadow .15s, opacity .15s;
      cursor: pointer;
      border: 1.5px solid transparent;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      background: linear-gradient(180deg, #122E66 0%, #0A1B3D 100%);
      color: #fff;
      box-shadow: 0 6px 16px rgba(10,27,61,.25);
    }
    .btn-primary:hover { opacity: .94; box-shadow: 0 8px 22px rgba(10,27,61,.32); color: #fff; text-decoration: none; }
    .btn-outline {
      background: #F7FAFE;
      color: #0C1F45;
      border-color: #D8E3F2;
    }
    .btn-outline:hover { background: #fff; border-color: #1B3F7A; color: #0C1F45; text-decoration: none; }
    .brand {
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px solid #EEF3FC;
      font-size: 11px;
      letter-spacing: 2.4px;
      color: #94A3B8;
      font-weight: 600;
      text-transform: uppercase;
    }
    .brand span { color: #1B3F7A; }
  </style>
</head>
<body>
  <div class="card" role="alert">
    <div class="badge" aria-hidden="true">
      {% if error_code == 404 %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      {% elif error_code == 403 %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      {% else %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      {% endif %}
    </div>

    <div class="code">{{ error_code }}</div>
    <h1 class="title">{{ error_title }}</h1>
    <p class="desc">{{ error_message }}</p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/>
        </svg>
        Go to dashboard
      </a>
      <a href="javascript:history.back()" class="btn btn-outline">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Go back
      </a>
    </div>

    <div class="brand"><span>ICEBERG</span> &middot; Study Center</div>
  </div>
</body>
</html>
