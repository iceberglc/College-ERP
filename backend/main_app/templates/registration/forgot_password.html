{% extends "registration/erpnext_base.html" %}

{% block content %}
<h2>Forgot password?</h2>
<p class="subtitle">Enter your registered email and we'll send a 6-digit verification code.</p>

{% if error %}
<div class="alert alert-danger">
  <i class="fas fa-exclamation-circle" style="margin-right:6px;"></i>{{ error }}
</div>
{% endif %}

<form method="post" novalidate>
  {% csrf_token %}
  <div class="form-group">
    <label for="id_email">Email address</label>
    <input type="email" id="id_email" name="email"
           value="{{ email }}"
           placeholder="you@example.com"
           autocomplete="email"
           required autofocus>
  </div>
  <div class="form-group" style="margin-top:24px;">
    <button type="submit">
      <i class="fas fa-paper-plane" style="margin-right:6px;"></i> Send Verification Code
    </button>
  </div>
</form>

<div class="text-center" style="margin-top:16px;">
  <a href="{% url 'login_page' %}" class="link">← Back to sign in</a>
</div>
{% endblock %}
