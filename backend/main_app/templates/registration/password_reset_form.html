{% extends "registration/erpnext_base.html" %}

{% block content %}
<h2>Forgot password?</h2>
<p class="subtitle">Enter your email and we'll send a reset link.</p>

<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label for="id_email">Email address</label>
    {{ form.email }}
  </div>
  <div class="form-group">
    <button type="submit">
      <i class="fas fa-paper-plane" style="margin-right:6px;"></i> Send Reset Link
    </button>
  </div>
  <div class="text-center mt-3">
    <a href="{% url 'login_page' %}" class="link">← Back to sign in</a>
  </div>
</form>
{% endblock %}
