{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Adaptive platform look (Apple glass / Android+other solid) — must run before paint -->
    <script src="{% static 'dist/js/platform-detect.js' %}"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Iceberg Study Center</title>
  <link rel="shortcut icon" href="{% static 'image/favicon1.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0C1F45;
      --navy-md: #1B3F7A;
      --navy-lt: #0E4BA0;
      --cyan:    #06B6D4;
      --bg:      #F0F6FF;
      --white:   #FFFFFF;
      --muted:   #64748B;
      --border:  #D1DCF0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ─── Welcome card ───────────────────────────────────── */
    #welcome {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(12,31,69,.10);
      width: 100%;
      max-width: 400px;
      padding: 40px 36px 36px;
      text-align: center;
    }

    .card-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .card-logo-img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-logo-img img { width: 26px; height: 26px; object-fit: contain; }
    .card-logo-text { text-align: left; }
    .card-logo-text strong { display: block; font-size: 14px; font-weight: 700; color: var(--navy); }
    .card-logo-text span   { font-size: 11px; color: var(--muted); font-weight: 500; }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 28px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 28px;
      letter-spacing: -.3px;
    }
    .btn-yes {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--navy-md), var(--navy));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity .15s;
    }
    .btn-yes:hover { opacity: .88; color: #fff; }

    .btn-no {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 12px 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-no:hover { border-color: #b0bdd8; color: #475569; }

    .card-footer {
      margin-top: 24px;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <!-- Welcome -->
  <div id="welcome">
    <div class="card">
      <div class="card-logo">
        <div class="card-logo-img">
          <img src="{% static 'dist/img/logo.png' %}" alt="">
        </div>
        <div class="card-logo-text">
          <strong>Iceberg Study Center</strong>
          <span>Student Portal</span>
        </div>
      </div>

      <div class="card-divider"></div>

      <h1 class="card-title">Welcome</h1>

      <a href="{% url 'login_page' %}" class="btn-yes">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
        </svg>
        Yes, sign me in
      </a>
      <a href="https://urchin-app-qs633.ondigitalocean.app/" class="btn-no" target="_blank" rel="noopener">
        No, I'm just visiting
        <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" style="opacity:.5">
          <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/>
          <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/>
        </svg>
      </a>

      <p class="card-footer">Iceberg Study Center · Private access only</p>
    </div>
  </div>


</body>
</html>
